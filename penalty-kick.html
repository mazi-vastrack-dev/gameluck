<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ GameLuck - Arcade Games Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⚽ Guess the Goal Direction</h1>
            <p>Predict where the ball will go before the penalty kick!</p>
        </div>

        <!-- Stats -->
        <div class="stats-panel">
            <div class="stat">
                <span class="stat-label">Attempts</span>
                <span class="stat-value" id="attempts">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Wins</span>
                <span class="stat-value" id="wins">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Win Rate</span>
                <span class="stat-value" id="winRate">0%</span>
            </div>
        </div>

        <!-- Game Area -->
        <div class="game-area">
            <!-- Goal Container -->
            <div class="goal-container">
                <!-- Goal Post -->
                <div class="goal-post">
                    <div class="post left-post"></div>
                    <div class="crossbar"></div>
                    <div class="post right-post"></div>
                    <div class="net"></div>
                </div>

                <!-- Goalkeeper -->
                <div class="goalkeeper" id="goalkeeper">
                    <div class="goalkeeper-body">
                        <div class="goalkeeper-head"></div>
                        <div class="goalkeeper-arm left-arm"></div>
                        <div class="goalkeeper-arm right-arm"></div>
                        <div class="goalkeeper-legs"></div>
                    </div>
                </div>

                <!-- Ball -->
                <div class="ball" id="ball"></div>

                <!-- Goal Zones (for visual feedback) -->
                <div class="direction-indicator" id="directionIndicator"></div>
            </div>

            <!-- Direction Selection Grid -->
            <div class="direction-grid" id="directionGrid">
                <!-- Will be generated by JavaScript -->
            </div>
        </div>

        <!-- Result Display -->
        <div class="result-container" id="resultContainer" style="display: none;">
            <div class="result-box">
                <div class="result-icon" id="resultIcon">✅</div>
                <div class="result-text" id="resultText">Goal! You guessed right!</div>
                <div class="result-details" id="resultDetails"></div>
                <div class="result-buttons">
                    <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button class="btn btn-primary" id="tryAgainBtn">Try Again</button>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="button-container">
            <button class="btn btn-primary" id="kickBtn" style="display: none;">🦵 KICK!</button>
            <button class="btn btn-secondary" id="playAgainBtn" style="display: none;">Play Again</button>
            <button class="btn btn-secondary" id="backBtn"><< Back to Menu</button>
        </div>

        <!-- Instructions -->
        <div class="instructions">
            <p>1️⃣ Select a direction where you think the ball will go</p>
            <p>2️⃣ Click the KICK button to start the penalty</p>
            <p>3️⃣ See if you predicted correctly!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
