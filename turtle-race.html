<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐢 Turtle Race</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; }
        h1 { color: #333; margin-bottom: 20px; text-align: center; }
        p { color: #666; margin-bottom: 30px; text-align: center; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat { background: #f0f0f0; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-label { display: block; font-size: 14px; color: #666; }
        .stat-value { display: block; font-size: 28px; font-weight: bold; color: #333; }
        .race-track { margin: 30px 0; }
        .turtle { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .turtle-lane { background: #E8F5E9; padding: 15px; border-radius: 8px; position: relative; min-height: 60px; }
        .turtle-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .turtle-name { font-size: 18px; font-weight: bold; }
        .turtle-position { width: 100%; background: #D4E8D4; height: 30px; border-radius: 5px; position: relative; }
        .turtle-progress { height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); border-radius: 5px; transition: width 0.3s; display: flex; align-items: center; justify-content: flex-end; padding-right: 5px; font-weight: bold; color: white; }
        .buttons { text-align: center; }
        button { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 5px; }
        button:hover { background: #764ba2; }
        .result { margin-top: 20px; padding: 15px; background: #FFF9C4; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐢 Turtle Race</h1>
        <p>Pick the turtle you think will win the race! (1 in 100 chance to win!)</p>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-label">Races</span>
                <span class="stat-value" id="races">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Wins</span>
                <span class="stat-value" id="wins">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Accuracy</span>
                <span class="stat-value" id="accuracy">0%</span>
            </div>
        </div>

        <div class="race-track">
            <div class="turtle">
                <div>
                    <div class="turtle-info">
                        <span class="turtle-name">🐢 Speedy</span>
                        <button onclick="chooseTurtle('speedy')">Choose</button>
                    </div>
                    <div class="turtle-position">
                        <div class="turtle-progress" id="speedy-progress"></div>
                    </div>
                </div>
                <div>
                    <div class="turtle-info">
                        <span class="turtle-name">🐢 Flash</span>
                        <button onclick="chooseTurtle('flash')">Choose</button>
                    </div>
                    <div class="turtle-position">
                        <div class="turtle-progress" id="flash-progress"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="result" id="result"></div>

        <div class="buttons">
            <button onclick="resetRace()">New Race</button>
            <button onclick="location.href='menu.html'">Back to Menu</button>
        </div>
    </div>

    <script>
        let gameStats = { races: 0, wins: 0 };
        let raceInProgress = false;

        function chooseTurtle(turtle) {
            if (raceInProgress) return;
            raceInProgress = true;
            gameStats.races++;

            // Simulate race - very difficult to win (1 in 100)
            let speedySpeed = Math.random() * 12 + 4;
            let flashSpeed = Math.random() * 12 + 4;
            
            let speedyPos = 0, flashPos = 0;
            const interval = setInterval(() => {
                speedyPos += speedySpeed + (Math.random() - 0.5) * 5;
                flashPos += flashSpeed + (Math.random() - 0.5) * 5;

                document.getElementById('speedy-progress').style.width = Math.min(speedyPos, 100) + '%';
                document.getElementById('flash-progress').style.width = Math.min(flashPos, 100) + '%';

                if (speedyPos >= 100 || flashPos >= 100) {
                    clearInterval(interval);
                    const winner = speedyPos > flashPos ? 'speedy' : 'flash';
                    const resultEl = document.getElementById('result');
                    
                    if (winner === turtle) {
                        gameStats.wins++;
                        resultEl.textContent = '🎉 You won! ' + (turtle === 'speedy' ? 'Speedy' : 'Flash') + ' won the race!';
                        resultEl.style.background = '#C8E6C9';
                    } else {
                        resultEl.textContent = '❌ You lost! ' + (winner === 'speedy' ? 'Speedy' : 'Flash') + ' won the race!';
                        resultEl.style.background = '#FFCDD2';
                    }
                    resultEl.style.display = 'block';
                    raceInProgress = false;
                    updateStats();
                }
            }, 50);
        }

        function resetRace() {
            document.getElementById('speedy-progress').style.width = '0%';
            document.getElementById('flash-progress').style.width = '0%';
            document.getElementById('result').style.display = 'none';
        }

        function updateStats() {
            document.getElementById('races').textContent = gameStats.races;
            document.getElementById('wins').textContent = gameStats.wins;
            document.getElementById('accuracy').textContent = gameStats.races > 0 ? Math.round((gameStats.wins / gameStats.races) * 100) + '%' : '0%';
        }
    </script>
</body>
</html>
