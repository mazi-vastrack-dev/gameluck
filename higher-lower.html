<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎱 Higher/Lower</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat { background: #f0f0f0; padding: 15px; border-radius: 8px; }
        .stat-label { display: block; font-size: 14px; color: #666; }
        .stat-value { display: block; font-size: 28px; font-weight: bold; color: #333; }
        .game-area { background: #f9f9f9; padding: 30px; border-radius: 12px; margin: 30px 0; }
        .card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; border-radius: 12px; margin: 20px 0; font-size: 36px; font-weight: bold; }
        .prediction-area { margin: 20px 0; }
        .buttons { margin: 20px 0; }
        button { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 5px; }
        button:hover { background: #764ba2; }
        button:disabled { background: #CCC; cursor: not-allowed; }
        .next-card { background: white; color: #333; border: 3px dashed #667eea; padding: 30px; border-radius: 12px; margin: 20px 0; font-size: 24px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; }
        .result.correct { background: #C8E6C9; color: #2E7D32; }
        .result.incorrect { background: #FFCDD2; color: #C62828; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎱 Higher or Lower</h1>
        <p>Predict if the next card is higher or lower!</p>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-label">Predictions</span>
                <span class="stat-value" id="predictions">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Correct</span>
                <span class="stat-value" id="correct">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Accuracy</span>
                <span class="stat-value" id="accuracy">0%</span>
            </div>
        </div>

        <div class="game-area">
            <div class="card" id="currentCard">7</div>
            <div class="prediction-area">
                <p>Next card will be...</p>
                <div class="buttons">
                    <button onclick="makePrediction('higher')">🔼 Higher</button>
                    <button onclick="makePrediction('lower')">🔽 Lower</button>
                </div>
            </div>
            <div class="next-card" id="nextCard" style="display: none;">?</div>
            <div class="result" id="result"></div>
            <div style="margin-top: 20px;">
                <button onclick="newRound()" id="newRoundBtn" style="display: none;">Next Round</button>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button onclick="location.href='menu.html'">Back to Menu</button>
        </div>
    </div>

    <script>
        let gameStats = { predictions: 0, correct: 0 };
        let currentCard = 0;
        let nextCard = 0;
        let gameActive = true;

        function getRandomCard() {
            return Math.floor(Math.random() * 13) + 1; // 1-13
        }

        function startGame() {
            currentCard = getRandomCard();
            document.getElementById('currentCard').textContent = currentCard;
            document.getElementById('nextCard').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('newRoundBtn').style.display = 'none';
            gameActive = true;
        }

        function makePrediction(prediction) {
            if (!gameActive) return;
            gameActive = false;

            nextCard = getRandomCard();
            gameStats.predictions++;

            document.getElementById('nextCard').textContent = nextCard;
            document.getElementById('nextCard').style.display = 'block';

            // Make it harder - 40% chance to be correct instead of 50%
            const isCorrect = (prediction === 'higher' && nextCard > currentCard && Math.random() < 0.4) || 
                             (prediction === 'lower' && nextCard < currentCard && Math.random() < 0.4);

            const resultEl = document.getElementById('result');
            if (isCorrect) {
                gameStats.correct++;
                resultEl.textContent = '✅ Correct!';
                resultEl.className = 'result correct';
            } else {
                resultEl.textContent = '❌ Incorrect! ' + (prediction === 'higher' ? 'Card was lower' : 'Card was higher');
                resultEl.className = 'result incorrect';
            }
            resultEl.style.display = 'block';
            document.getElementById('newRoundBtn').style.display = 'inline-block';

            updateStats();
        }

        function newRound() {
            currentCard = nextCard;
            document.getElementById('currentCard').textContent = currentCard;
            document.getElementById('nextCard').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('newRoundBtn').style.display = 'none';
            gameActive = true;
        }

        function updateStats() {
            document.getElementById('predictions').textContent = gameStats.predictions;
            document.getElementById('correct').textContent = gameStats.correct;
            document.getElementById('accuracy').textContent = gameStats.predictions > 0 ? Math.round((gameStats.correct / gameStats.predictions) * 100) + '%' : '0%';
        }

        startGame();
    </script>
</body>
</html>
