<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎱 Higher or Lower - Arcade Game Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="game-hub.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #08090f;
      --bg-card:   rgba(17, 19, 31, 0.65);
      --bg-raised: rgba(30, 33, 50, 0.85);
      --border:    rgba(255, 255, 255, 0.08);
      --border-md: rgba(255, 255, 255, 0.15);
      --text:      #e8eaf0;
      --text-2:    #9ca3af;
      --text-3:    #4b5563;
      --green-bg:  rgba(16, 185, 129, 0.08);
      --green-bd:  #10b981;
      --green-txt: #34d399;
      --green-dk:  #047857;
      --red-bg:    rgba(239, 68, 68, 0.08);
      --red-bd:    #ef4444;
      --red-txt:   #f87171;
      --red-dk:    #b91c1c;
      --gold:      #f59e0b;
      --radius:    16px;
      --radius-sm: 10px;
      --radius-full: 999px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem 5rem;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
    }

    /* ── Page header ── */
    .page-header {
      text-align: center;
      margin-bottom: 1.5rem;
      animation: fadeDown 0.5s ease forwards;
    }
    .page-header .eyebrow {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--text-2);
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .page-header h1 {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 800; color: var(--text);
      margin-bottom: 0.35rem;
      background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-header .sub {
      font-size: 14px; color: var(--text-2);
    }
    .difficulty-indicator {
      font-size: 12px;
      font-weight: 600;
      margin-top: 6px;
    }

    /* ── Game card ── */
    #game-card {
      width: 100%; max-width: 620px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-premium);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .card-top {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .card-top-title {
      font-size: 13px; font-weight: 600;
      color: var(--text-2);
      display: flex; align-items: center; gap: 7px;
    }
    .card-top-title svg { opacity: 0.6; color: var(--neon-blue); }

    .stat-row { display: flex; gap: 8px; }

    .stat-chip {
      font-size: 12px; font-weight: 600;
      padding: 5px 14px; border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-md);
      color: var(--text-2);
    }
    .stat-chip b { color: var(--text); font-weight: 700; }
    .stat-chip b.highlight { color: var(--neon-blue); }

    /* Timer Bar */
    .timer-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      background: var(--gold);
      width: 100%;
      box-shadow: 0 0 8px var(--gold);
      transition: width 1s linear;
    }

    .card-body { padding: 1.75rem 1.5rem 2rem; }

    /* ── Streak dots ── */
    .streak-track {
      display: flex; gap: 6px;
      justify-content: center;
      margin-bottom: 1.2rem;
    }
    .s-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-md);
      transition: background 0.3s, border-color 0.3s;
    }
    .s-dot.win  { background: var(--green-dk); border-color: var(--green-txt); }
    .s-dot.lose { background: var(--red-dk);   border-color: var(--red-txt); }
    .s-dot.cur  { border-color: var(--text-2); background: rgba(255, 255, 255, 0.1); }

    /* ── Round label ── */
    .round-label {
      text-align: center;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-2); margin-bottom: 1.5rem;
    }

    /* ── Equation row ── */
    .eq-row {
      display: flex; align-items: center;
      justify-content: center; flex-wrap: wrap;
      gap: 10px 8px; margin-bottom: 1.2rem;
    }

    .ball {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; font-weight: 700;
      background: var(--bg-raised);
      border: 1px solid var(--border-md);
      color: var(--text);
      transition: background 0.25s, border-color 0.25s, color 0.25s;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .ball.mystery {
      background: rgba(255, 255, 255, 0.02);
      border: 2px dashed var(--border-md);
      color: var(--text-2);
      font-size: 22px;
    }

    .ball.ok {
      background: var(--green-bg);
      border: 2px solid var(--green-bd);
      color: var(--green-txt);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.15);
    }

    .ball.bad {
      background: var(--red-bg);
      border: 2px solid var(--red-bd);
      color: var(--red-txt);
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.15);
    }

    .op {
      font-size: 20px; font-weight: 700;
      color: var(--text-2); flex-shrink: 0;
    }

    .eq-equals {
      font-size: 20px; font-weight: 700;
      color: var(--text-2); flex-shrink: 0;
    }

    .target-badge {
      padding: 0 18px; height: 56px;
      border-radius: var(--radius);
      background: var(--bg-raised);
      border: 1px solid var(--border-md);
      display: flex; align-items: center;
      gap: 6px; font-size: 14px; font-weight: 600;
      color: var(--text-2); flex-shrink: 0;
      white-space: nowrap;
    }
    .target-badge .t-num {
      font-size: 18px; font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 6px rgba(245, 158, 11, 0.3);
    }

    /* ── Hint ── */
    .hint-line {
      text-align: center; font-size: 13px;
      color: var(--text-2); min-height: 22px;
      margin-bottom: 1.25rem; font-style: italic;
    }

    /* ── Divider ── */
    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 0 0 1.25rem;
    }

    /* ── Predict label ── */
    .predict-lbl {
      text-align: center; font-size: 11px;
      font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text-2);
      margin-bottom: 0.85rem;
    }

    /* ── Prediction buttons ── */
    .pred-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; max-width: 400px; margin: 0 auto 1.25rem;
    }

    .pred-btn {
      padding: 15px 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-md);
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 600;
      color: var(--text);
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      transition: all 0.15s;
    }
    .pred-btn:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
    }
    .pred-btn:active:not(:disabled) { transform: scale(0.98); }
    .pred-btn:disabled { cursor: default; opacity: 0.5; }

    .pred-btn .arr { font-size: 20px; font-weight: 700; }
    .pred-btn.h-btn .arr { color: var(--green-bd); }
    .pred-btn.l-btn .arr { color: var(--red-bd); }

    .pred-btn.sel-h {
      background: var(--green-bg);
      border-color: var(--green-bd);
      color: var(--green-txt);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
    }
    .pred-btn.sel-l {
      background: var(--red-bg);
      border-color: var(--red-bd);
      color: var(--red-txt);
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.1);
    }

    /* ── Result panel ── */
    .result-panel {
      max-width: 420px; margin: 0 auto 1.2rem;
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      text-align: center;
      border: 1px solid var(--border);
      background: var(--bg-raised);
    }
    .result-panel.ok  { background: var(--green-bg); border-color: var(--green-bd); }
    .result-panel.bad { background: var(--red-bg);   border-color: var(--red-bd); }

    .res-head {
      font-size: 16px; font-weight: 700;
      margin-bottom: 4px;
    }
    .result-panel.ok  .res-head { color: var(--green-txt); }
    .result-panel.bad .res-head { color: var(--red-txt); }

    .res-body { font-size: 13.5px; }
    .result-panel.ok  .res-body { color: var(--green-txt); opacity: 0.9; }
    .result-panel.bad .res-body { color: var(--red-txt); opacity: 0.9; }

    /* ── Action row ── */
    .action-row {
      display: flex; justify-content: center; gap: 10px;
    }

    .act-btn {
      padding: 11px 26px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-md);
      background: var(--bg-raised);
      font-family: 'Outfit', sans-serif;
      font-size: 13.5px; font-weight: 600;
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s;
      text-decoration: none;
    }
    .act-btn:hover { background: rgba(255, 255, 255, 0.05); }
    .act-btn.primary {
      background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
      color: white;
      border-color: #6366f1;
    }
    .act-btn.primary:hover { opacity: 0.95; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25); }

    /* ── Animations ── */
    .fade-in { animation: fi 0.3s ease forwards; }
    @keyframes fi {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .shake { animation: sh 0.35s ease; }
    @keyframes sh {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card-body { padding: 1.25rem 1rem 1.5rem; }
      .ball { width: 48px; height: 48px; font-size: 16px; }
      .target-badge { height: 48px; padding: 0 12px; font-size: 13px; }
      .pred-btn { padding: 13px 0; font-size: 13px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <p class="eyebrow">Sudden-Death Prediction</p>
    <h1>Higher or Lower</h1>
    <p class="sub">Timed rounds. Get 5/5 to win or lose everything!</p>
    <div class="difficulty-indicator" id="difficultyLabel">Difficulty: Normal</div>
  </header>

  <main id="game-card">
    <div class="timer-container">
      <div class="timer-bar" id="timer-bar"></div>
    </div>
    <div class="card-top">
      <span class="card-top-title">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Number Prediction (⏱️ 6s)
      </span>
      <div class="stat-row">
        <div class="stat-chip">Streak <b class="highlight" id="score-val">0</b></div>
        <div class="stat-chip">Best <b id="best-val">0</b></div>
      </div>
    </div>
    <div class="card-body" id="card-body"></div>
  </main>

  <div style="text-align:center; margin-top:12px;">
    <a href="index.html" class="act-btn">← Return to Lobby</a>
  </div>

  <!-- Game Over Payout Modal -->
  <div class="hub-modal-overlay" id="payoutModal">
      <div class="hub-modal-box">
          <div class="hub-modal-icon" id="modalResultIcon">🏆🎱</div>
          <h3 class="hub-modal-title" id="modalResultTitle">Round Session Finished!</h3>
          <p class="hub-modal-desc" id="modalResultDesc">Your prediction session has completed.</p>
          
          <div class="hub-modal-stats">
              <div class="hub-modal-stat">
                  <span class="hub-modal-stat-label">Result Status</span>
                  <span class="hub-modal-stat-value highlight" id="modalAccuracy">0%</span>
              </div>
              <div class="hub-modal-stat">
                  <span class="hub-modal-stat-label">Coins Earned</span>
                  <span class="hub-modal-stat-value gold" id="modalCoins">0</span>
              </div>
          </div>

          <div class="hub-modal-buttons">
              <button class="hub-btn hub-btn-secondary" onclick="location.href='index.html'">Lobby</button>
              <button class="hub-btn hub-btn-primary" onclick="closePayoutModal(); resetGame();">Play Again</button>
          </div>
      </div>
  </div>

  <!-- Include Game Hub central script -->
  <script src="game-hub.js"></script>
  <script>
    // Read difficulty configuration
    const difficulty = window.gameHub.getDifficulty();
    document.getElementById('difficultyLabel').textContent = `Difficulty: ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;
    if (difficulty === 'easy') {
        document.getElementById('difficultyLabel').style.color = 'var(--neon-green)';
    } else if (difficulty === 'hard') {
        document.getElementById('difficultyLabel').style.color = 'var(--neon-red)';
    } else {
        document.getElementById('difficultyLabel').style.color = 'var(--neon-gold)';
    }

    const DIFFICULTY_REWARDS = {
        easy: { baseCoins: 12, payoutPerHit: 2 },
        normal: { baseCoins: 25, payoutPerHit: 5 },
        hard: { baseCoins: 50, payoutPerHit: 10 }
    }[difficulty];

    const ROUNDS = 5; // Reduced to 5 rounds (must get all 5)

    function ri(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    const TEMPLATES = [
      {
        gen() {
          const a = ri(1, 15), b = ri(1, 15), x = ri(1, 20);
          const real = a + b + x;
          const target = ri(Math.max(3, real - 12), real + 12);
          return { parts: [a, b], ops: ['+', '+'], x, real, target,
            formulaDisplay(xVal) { return `${a} + ${b} + ${xVal}`; } };
        }
      },
      {
        gen() {
          const a = ri(1,10), b = ri(1,10), c = ri(1,10), x = ri(1,15);
          const real = a + b + c + x;
          const target = ri(Math.max(4, real - 14), real + 14);
          return { parts: [a, b, c], ops: ['+', '+', '+'], x, real, target,
            formulaDisplay(xVal) { return `${a} + ${b} + ${c} + ${xVal}`; } };
        }
      },
      {
        gen() {
          const a = ri(2, 6), b = ri(2, 6), x = ri(2, 8);
          const real = a * b * x;
          const target = ri(Math.max(4, real - 30), real + 30);
          return { parts: [a, b], ops: ['×', '×'], x, real, target,
            formulaDisplay(xVal) { return `${a} × ${b} × ${xVal}`; } };
        }
      },
      {
        gen() {
          const a = ri(1,12), b = ri(1,12), x = ri(1,15);
          const real = a * b + x;
          const target = ri(Math.max(2, real - 20), real + 20);
          return { parts: [a, b], ops: ['×', '+'], x, real, target,
            formulaDisplay(xVal) { return `${a} × ${b} + ${xVal}`; } };
        }
      },
      {
        gen() {
          const a = ri(2, 9), b = ri(1, 10), x = ri(1, 12);
          const real = a * a + b + x;
          const target = ri(Math.max(3, real - 18), real + 18);
          return { parts: [a, b], ops: ['²+', '+'], x, real, target,
            formulaDisplay(xVal) { return `${a}² + ${b} + ${xVal}`; } };
        }
      },
      {
        gen() {
          const a = ri(5, 20), b = ri(5, 20), x = ri(1, 25);
          const real = a + b + x;
          const target = ri(Math.max(10, real - 15), real + 15);
          return { parts: [a, b], ops: ['+', '+'], x, real, target,
            formulaDisplay(xVal) { return `${a} + ${b} + ${xVal}`; } };
        }
      },
      {
        gen() {
          const a = ri(1, 8), b = ri(1, 8), c = ri(1, 8), x = ri(1, 10);
          const real = a * b + c + x;
          const target = ri(Math.max(3, real - 16), real + 16);
          return { parts: [a, b, c], ops: ['×', '+', '+'], x, real, target,
            formulaDisplay(xVal) { return `${a} × ${b} + ${c} + ${xVal}`; } };
        }
      }
    ];

    /* ═══════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════ */
    let score = 0, best = window.gameHub.stats.bestScores.higherlower || 0;
    let round = 0;
    let streak = [];
    let currentQ = null, answered = false;
    let timerVal = 6;
    let timerInterval = null;

    document.getElementById('best-val').textContent = best;

    /* ═══════════════════════════════════════════════
       ENGINE
    ═══════════════════════════════════════════════ */
    function generateQuestion() {
      let pool = [...TEMPLATES];
      if (difficulty === 'easy') {
        pool = [TEMPLATES[0], TEMPLATES[1], TEMPLATES[5]]; 
      } else if (difficulty === 'hard') {
        pool = [TEMPLATES[2], TEMPLATES[3], TEMPLATES[4], TEMPLATES[6]]; 
      }

      const tpl = pool[Math.floor(Math.random() * pool.length)];
      let q, attempts = 0;
      do { q = tpl.gen(); attempts++; } while (q.target === q.real && attempts < 12);
      
      // Decouple answer from math range to ensure a perfect 50/50 balance
      const forceAnswer = Math.random() > 0.5 ? 'higher' : 'lower';
      
      let offset;
      if (difficulty === 'easy') {
        offset = ri(10, 20);
      } else if (difficulty === 'hard') {
        offset = ri(1, 3);
      } else {
        offset = ri(4, 9);
      }

      if (forceAnswer === 'higher') {
        q.target = q.real - offset;
      } else {
        q.target = q.real + offset;
      }
      
      q.answer = forceAnswer;
      return q;
    }

    /* ═══════════════════════════════════════════════
       TIMER LOGIC
    ═══════════════════════════════════════════════ */
    function startTimer() {
      clearInterval(timerInterval);
      timerVal = 6;
      updateTimerUI();

      timerInterval = setInterval(() => {
        timerVal--;
        updateTimerUI();
        if (timerVal <= 0) {
          clearInterval(timerInterval);
          predict('timeout'); // Time is up! Registers as wrong prediction
        }
      }, 1000);
    }

    function updateTimerUI() {
      const bar = document.getElementById('timer-bar');
      if (bar) {
        // compute width percentage
        const pct = (timerVal / 6) * 100;
        bar.style.width = pct + '%';
        if (timerVal <= 2) {
          bar.style.background = 'var(--neon-red)';
          bar.style.boxShadow = '0 0 8px var(--neon-red)';
        } else {
          bar.style.background = 'var(--neon-gold)';
          bar.style.boxShadow = '0 0 8px var(--neon-gold)';
        }
      }
    }

    /* ═══════════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════════ */
    function render() {
      const body = document.getElementById('card-body');

      if (round >= ROUNDS) {
        renderGameOver(true); // Completed all 5/5
        return;
      }

      currentQ = generateQuestion();
      answered = false;

      const dots = Array.from({ length: ROUNDS }, (_, i) => {
        if (i < streak.length) return `<div class="s-dot ${streak[i]}"></div>`;
        if (i === round) return `<div class="s-dot cur"></div>`;
        return `<div class="s-dot"></div>`;
      }).join('');

      const ballsHtml = buildEquationHTML(currentQ, false);

      body.innerHTML = `
        <div class="fade-in">
          <div class="streak-track">${dots}</div>
          <div class="round-label">Round ${round + 1} of ${ROUNDS}</div>
          <div class="eq-row" id="eq-row">${ballsHtml}</div>
          <div class="hint-line" id="hint">Prediction window is 6 seconds!</div>
          <div class="divider"></div>
          <div class="predict-lbl">Your prediction</div>
          <div class="pred-grid">
            <button class="pred-btn h-btn" id="btn-h" onclick="predict('higher')">
              <span class="arr">↑</span> Higher than ${currentQ.target}
            </button>
            <button class="pred-btn l-btn" id="btn-l" onclick="predict('lower')">
              <span class="arr">↓</span> Lower than ${currentQ.target}
            </button>
          </div>
          <div id="result-area"></div>
        </div>`;

      // Start the countdown timer
      startTimer();
    }

    function buildEquationHTML(q, revealed, correct) {
      const parts = q.parts;
      const ops = q.ops;
      let html = '';

      if (ops[0] === '²+') {
        html += `<div class="ball">${parts[0]}²</div>`;
        html += `<div class="op">+</div>`;
        html += `<div class="ball">${parts[1]}</div>`;
        html += `<div class="op">+</div>`;
      } else {
        parts.forEach((n, i) => {
          html += `<div class="ball">${n}</div>`;
          html += `<div class="op">${ops[i]}</div>`;
        });
      }

      if (revealed) {
        const cls = correct ? 'ok' : 'bad';
        html += `<div class="ball ${cls}" id="mystery-ball">${q.x}</div>`;
      } else {
        html += `<div class="ball mystery" id="mystery-ball">?</div>`;
      }

      html += `<div class="eq-equals">=</div>`;
      html += `<div class="target-badge">
        <span>Result vs</span>
        <span class="t-num">${q.target}</span>
        <span>?</span>
      </div>`;

      return html;
    }

    function predict(choice) {
      if (answered) return;
      answered = true;
      clearInterval(timerInterval); // Stop timer

      const q = currentQ;
      const isTimeout = choice === 'timeout';
      const correct = !isTimeout && choice === q.answer;
      const direction = q.real > q.target ? 'higher' : 'lower';
      const diff = Math.abs(q.real - q.target);

      const btnH = document.getElementById('btn-h');
      const btnL = document.getElementById('btn-l');
      btnH.disabled = true;
      btnL.disabled = true;

      if (choice === 'higher') btnH.classList.add('sel-h');
      if (choice === 'lower') btnL.classList.add('sel-l');

      const eq = document.getElementById('eq-row');
      eq.innerHTML = buildEquationHTML(q, true, correct);
      if (!correct) document.getElementById('mystery-ball').classList.add('shake');

      let hintText = '';
      if (isTimeout) {
        hintText = `⏱️ Time Out! The correct result was ${q.formulaDisplay(q.x)} = ${q.real} (${direction} than ${q.target})`;
      } else {
        hintText = `${q.formulaDisplay(q.x)} = ${q.real} — that's ${diff} ${direction} than ${q.target}`;
      }
      document.getElementById('hint').textContent = hintText;

      const ra = document.getElementById('result-area');
      
      if (correct) {
        score++;
        window.gameHub.playTone(880, 0.08, 'sine', 0.08); // ding
        
        if (score > best) {
            best = score;
            window.gameHub.recordBestScore('higherlower', best);
            document.getElementById('best-val').textContent = best;
        }
        streak.push('win');
        document.getElementById('score-val').textContent = score;

        ra.innerHTML = `
          <div class="result-panel ok fade-in">
            <div class="res-head">Correct!</div>
            <div class="res-body">The result ${q.real} is ${direction} than ${q.target} — keep it up!</div>
          </div>
          <div class="action-row">
            <button class="act-btn primary" onclick="nextRound()">
              ${round + 1 >= ROUNDS ? 'See results' : 'Next round'}
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
              </svg>
            </button>
          </div>`;
      } else {
        // Sudden Death Trigger! One mistake = game over with points vanished!
        window.gameHub.playTone(220, 0.25, 'triangle', 0.08); // fail buzz
        streak.push('lose');
        
        // Change text in result-panel to emphasize points vanish
        ra.innerHTML = `
          <div class="result-panel bad fade-in">
            <div class="res-head">Prediction Failed!</div>
            <div class="res-body">
              ${isTimeout ? 'You ran out of time! ' : `Wrong prediction! `}
              Your accumulated points vanished!
            </div>
          </div>
          <div class="action-row">
            <button class="act-btn primary" onclick="renderGameOver(false)">
              See results
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
              </svg>
            </button>
          </div>`;
      }
    }

    function nextRound() {
      round++;
      render();
    }

    function renderGameOver(success) {
      clearInterval(timerInterval);
      
      let coinsEarned = 0;
      let finalScore = score;

      if (success && score === ROUNDS) { // Got all 5/5 correct!
          coinsEarned = ROUNDS * DIFFICULTY_REWARDS.payoutPerHit;
          window.gameHub.recordWin('higherlower', coinsEarned);
          window.gameHub.playWin();
          
          document.getElementById('modalResultTitle').textContent = 'Perfect 5/5 Score!';
          document.getElementById('modalResultIcon').textContent = '🏆🎱🌟';
          document.getElementById('modalResultDesc').textContent = `Incredible! You survived the sudden-death countdown and claimed the maximum payout on ${difficulty}!`;
          document.getElementById('modalAccuracy').textContent = 'PERFECT';
          document.getElementById('modalAccuracy').style.color = 'var(--neon-green)';
      } else {
          // Points vanished!
          finalScore = 0;
          window.gameHub.recordLoss();
          
          document.getElementById('modalResultTitle').textContent = 'Points Vanished!';
          document.getElementById('modalResultIcon').textContent = '☠️🎱💦';
          document.getElementById('modalResultDesc').textContent = `You made a mistake or ran out of time. All potential coins disintegrated! Try again for a perfect run.`;
          document.getElementById('modalAccuracy').textContent = 'FAILED';
          document.getElementById('modalAccuracy').style.color = 'var(--neon-red)';
      }

      // Populate modal fields
      document.getElementById('modalCoins').textContent = coinsEarned;

      // Show Modal
      document.getElementById('payoutModal').classList.add('active');
    }

    function closePayoutModal() {
        document.getElementById('payoutModal').classList.remove('active');
    }

    function resetGame() {
      score = 0; round = 0; streak = [];
      document.getElementById('score-val').textContent = 0;
      closePayoutModal();
      render();
    }

    render();
  </script>
</body>
</html>
