<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Outfit:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="game-hub.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-dim: #7a5a1a;
      --gold-faint: #5a3e1b;
      --bg-deep: #08090f;
      --bg-mid: rgba(255, 255, 255, 0.02);
      --bg-hover: rgba(255, 255, 255, 0.06);
      --text-main: #e8d9b0;
      --text-body: #d4c49a;
      --text-muted: #8c8264;
      --text-faint: #b0a080;
      --danger: #ef4444;
      --danger-dim: #991b1b;
      --border: rgba(90, 62, 27, 0.2);
      --border-hover: rgba(201, 168, 76, 0.4);
    }

    html, body {
      min-height: 100%;
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Lora', Georgia, serif;
      transition: background-color 0.8s ease;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2.5rem 1rem 4rem;
      background-image:
        radial-gradient(ellipse 100% 50% at 50% 0%, rgba(201, 168, 76, 0.03) 0%, transparent 70%);
    }

    /* ── Page header ── */
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease forwards;
    }

    .page-header .eyebrow {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.15);
      margin-bottom: 0.4rem;
      transition: color 0.8s ease;
    }

    .page-header .subtitle {
      font-size: 13px;
      color: var(--text-faint);
      font-style: italic;
    }

    .difficulty-indicator {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      margin-top: 6px;
    }

    /* ── Game card ── */
    #game-card {
      width: 100%;
      max-width: 660px;
      background: rgba(17, 19, 31, 0.65);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow-premium);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.8s ease;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      padding: 1.75rem 2rem 2rem;
    }

    /* ── Card header ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.85rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.8s ease;
    }

    .game-title-sm {
      font-family: 'Cinzel Decorative', serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.8s ease;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .adv-tag {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shield-badge {
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 700;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--neon-green);
      color: var(--neon-green);
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .shield-badge.broken {
      background: rgba(239, 68, 68, 0.1);
      border-color: var(--neon-red);
      color: var(--neon-red);
    }

    .new-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .new-btn:hover { background: var(--bg-hover); border-color: var(--gold); }

    /* ── Progress ── */
    .progress-bar {
      display: flex;
      gap: 7px;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .pip {
      height: 4px;
      width: 32px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: background 0.35s, border-color 0.35s;
    }
    .pip.done  { background: var(--gold); border-color: var(--gold); }
    .pip.active { background: var(--gold-dim); border-color: var(--gold); }

    /* ── Scene ── */
    .scene-wrap { animation: fadeUp 0.4s ease forwards; }

    .scene-icon {
      font-size: 44px;
      text-align: center;
      margin-bottom: 0.85rem;
      filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.1));
    }

    .scene-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(14px, 2.5vw, 18px);
      font-weight: 700;
      color: var(--gold);
      text-align: center;
      margin-bottom: 0.85rem;
      transition: color 0.8s ease;
    }

    .scene-text {
      font-size: 14.5px;
      line-height: 1.85;
      color: var(--text-body);
      font-style: italic;
      max-width: 540px;
      margin: 0 auto 1.75rem;
      text-align: center;
    }

    .scene-text em {
      font-style: normal;
      color: var(--text-main);
      font-weight: 600;
    }

    /* ── Choices ── */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 11px;
      max-width: 520px;
      margin: 0 auto;
    }

    .choice-btn {
      background: var(--bg-mid);
      border: 1px solid var(--border);
      color: var(--text-body);
      font-family: 'Lora', serif;
      font-size: 13.5px;
      padding: 13px 18px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .choice-btn:hover {
      background: var(--bg-hover);
      border-color: var(--gold);
      color: var(--text-main);
      transform: translateX(5px);
    }
    .choice-btn:active { transform: translateX(5px) scale(0.99); }

    .choice-letter {
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      min-width: 18px;
      padding-top: 2px;
      transition: color 0.8s ease;
    }

    /* ── Outcome ── */
    .outcome-wrap {
      max-width: 520px;
      margin: 0 auto;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      animation: fadeUp 0.4s ease forwards;
    }

    .outcome-wrap.win {
      background: rgba(16, 185, 129, 0.03);
      border: 1px solid rgba(16, 185, 129, 0.25);
    }

    .outcome-wrap.lose {
      background: rgba(239, 68, 68, 0.03);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .outcome-icon { font-size: 40px; margin-bottom: 0.75rem; }

    .outcome-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(14px, 3vw, 18px);
      margin-bottom: 0.85rem;
    }
    .outcome-wrap.win .outcome-title  { color: var(--gold); }
    .outcome-wrap.lose .outcome-title { color: var(--danger); }

    .outcome-text {
      font-size: 13.5px;
      line-height: 1.85;
      color: var(--text-body);
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    .outcome-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 11px 28px;
      border-radius: 9px;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .outcome-wrap.win .outcome-btn  { border-color: var(--gold); color: var(--gold); }
    .outcome-wrap.win .outcome-btn:hover  { background: rgba(255, 255, 255, 0.05); }
    .outcome-wrap.lose .outcome-btn { border-color: var(--danger-dim); color: var(--danger); }
    .outcome-wrap.lose .outcome-btn:hover { background: rgba(239, 68, 68, 0.1); }

    .reward-payout-text {
        font-family: 'Outfit', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--gold);
        margin-bottom: 14px;
        text-shadow: 0 0 4px rgba(201, 168, 76, 0.3);
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0 0;
      transition: border-color 0.8s ease;
    }

    /* ── Page footer ── */
    .page-footer {
      margin-top: 1.75rem;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .card-inner { padding: 1.25rem 1.25rem 1.5rem; }
      .scene-text { font-size: 13px; }
      .choice-btn { font-size: 13px; padding: 11px 14px; }
      .header-right .adv-tag { display: none; }
    }
  </style>
</head>

    function startNewAdventure() {
      window.gameHub.playClick();
      generateDynamicAdventure();
      
      stepsCompleted = 0;
      lastStepId = null;
      playerHasShield = DIFFICULTY_CONFIG.hasShield;
      
      // Dynamically apply adventure color themes
      applyAdventureTheme(currentAdventure.id);

      renderStep('start');
    }

    function applyAdventureTheme(storyId) {
        const theme = ADVENTURE_THEMES[storyId];
        if (theme) {
            document.documentElement.style.setProperty('--gold', theme.gold);
            document.documentElement.style.setProperty('--bg-deep', theme.bg);
            document.documentElement.style.setProperty('--border', theme.border);
        }
    }

    function makeChoice(nextId, currentId) {
      window.gameHub.playClick();
      lastStepId = currentId; // save backtracking point
      stepsCompleted = Math.min(stepsCompleted + 1, TOTAL_PIPS);
      renderStep(nextId);
    }

    function buildPips(done, active, total) {
      let html = '';
      for (let i = 0; i < total; i++) {
        let cls = 'pip';
        if (i < done) cls += ' done';
        else if (i === done && active) cls += ' active';
        html += `<div class="${cls}"></div>`;
      }
      return html;
    }

    function triggerShieldRescue() {
        window.gameHub.playTone(450, 0.4, 'triangle', 0.1); // fail buffer alarm
        playerHasShield = false;
        stepsCompleted = Math.max(0, stepsCompleted - 1);
        
        const el = document.getElementById('game-inner');
        const pips = buildPips(stepsCompleted, true, TOTAL_PIPS);
        const header = `
          <div class="card-header">
            <span class="game-title-sm">⚔ Treasure Hunt</span>
            <div class="header-right">
              <span class="adv-tag">${currentAdventure.tag}</span>
              <span class="shield-badge broken">🛡️ Shield Broken</span>
            </div>
          </div>
          <div class="progress-bar">${pips}</div>
        `;

        el.innerHTML = header + `
          <div class="scene-wrap">
            <div class="scene-icon">🛡️⚡</div>
            <div class="scene-title" style="color: var(--neon-red);">Shield Consumed!</div>
            <p class="scene-text" style="font-weight: 500;">
                The trap triggered, but your **Arcade Shield** absorbed the crushing force! The shield shattered, but you successfully backtracked to safety.
            </p>
            <div class="choices">
                <button class="choice-btn" onclick="renderStep('${lastStepId}')">
                    <span class="choice-letter">↩</span>
                    <span>Return to Safety</span>
                </button>
            </div>
          </div>
        `;
    }

    function getStep(adv, id) {
      if (id === null || id === 'start') return adv.steps[0];
      return adv.steps.find(s => s.id === id) || adv.steps[0];
    }

    function renderStep(stepId) {
      const adv = currentAdventure;
      const step = getStep(adv, stepId);
      const el = document.getElementById('game-inner');

      const pips = buildPips(stepsCompleted, true, TOTAL_PIPS);
      
      // Shield Badge html
      let shieldHtml = '';
      if (DIFFICULTY_CONFIG.hasShield) {
          shieldHtml = playerHasShield 
              ? `<span class="shield-badge">🛡️ Shield Active</span>` 
              : `<span class="shield-badge broken">🛡️ Shield Broken</span>`;
      }

      const header = `
        <div class="card-header">
          <span class="game-title-sm">⚔ Treasure Hunt</span>
          <div class="header-right">
            <span class="adv-tag">${adv.tag}</span>
            ${shieldHtml}
            <button class="new-btn" onclick="startNewAdventure()">↺ New Story</button>
          </div>
        </div>
        <div class="progress-bar">${pips}</div>
      `;

      // Trap checking for Shield Trigger
      if (step.outcome && step.outcome === 'lose' && playerHasShield) {
          triggerShieldRescue();
          return;
      }

      if (step.outcome) {
        const isWin = step.outcome === 'win';
        
        let coinsEarned = 0;
        if (isWin) {
            coinsEarned = DIFFICULTY_CONFIG.baseCoins;
            window.gameHub.recordWin('treasure', coinsEarned);
            window.gameHub.playWin();
        } else {
            window.gameHub.recordLoss();
            window.gameHub.playTone(200, 0.4, 'sawtooth', 0.12);
        }

        el.innerHTML = header + `
          <div class="scene-wrap">
            <div class="scene-icon">${step.icon}</div>
            <div class="scene-title">${step.title}</div>
            <p class="scene-text">${step.text}</p>
            <div class="outcome-wrap ${isWin ? 'win' : 'lose'}">
              <div class="outcome-icon">${isWin ? '🏆' : '☠️'}</div>
              <div class="outcome-title">${step.outcomeTitle}</div>
              ${isWin ? `<div class="reward-payout-text">+${coinsEarned} Coins Claimed!</div>` : ''}
              <p class="outcome-text">${step.outcomeText}</p>
              <button class="outcome-btn" onclick="startNewAdventure()">
                ${isWin ? '✦ New Adventure ✦' : '↩ Try Again'}
              </button>
            </div>
            <hr class="divider" />
          </div>
        `;
        return;
      }

      const choicesHtml = step.choices.map((c, i) => `
        <button class="choice-btn" onclick="makeChoice('${c.next}', '${step.id}')">
          <span class="choice-letter">${LETTERS[i]}.</span>
          <span>${c.text}</span>
        </button>
      `).join('');

      el.innerHTML = header + `
        <div class="scene-wrap">
          <div class="scene-icon">${step.icon}</div>
          <div class="scene-title">${step.title}</div>
          <p class="scene-text">${step.text}</p>
          <div class="choices">${choicesHtml}</div>
        </div>
      `;
    }

    // Start on load
    startNewAdventure();
  </script>
</body>
</html>
