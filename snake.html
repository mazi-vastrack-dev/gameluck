<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake - Arcade Game Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game-hub.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            overflow: hidden;
            padding: 20px;
        }

        .game-wrapper {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-premium);
            max-width: 480px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
        }

        .game-header h2 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-header p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
        }

        .difficulty-indicator {
            font-size: 12px;
            font-weight: 600;
            margin: -5px 0 5px 0;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.highlight {
            color: var(--neon-green);
        }

        #gameCanvas {
            border: 2px solid var(--border-subtle);
            border-radius: 16px;
            background: #090a12;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            max-height: 38vh; /* Scale canvas vertically to leave space for controls */
        }

        /* Mobile Controls */
        .virtual-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 140px;
            margin: 0 auto;
        }

        .btn-ctrl {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            border-radius: 10px;
            width: 42px;
            height: 42px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        /* Mobile layout overrides for short/small screens */
        @media (max-height: 740px) or (max-width: 480px) {
            body {
                padding: 10px;
            }
            .game-wrapper {
                padding: 12px;
                gap: 10px;
                border-radius: 16px;
            }
            .game-header h2 {
                font-size: 20px;
            }
            .stats-row {
                gap: 6px;
            }
            .stat-box {
                padding: 6px;
            }
            .virtual-controls {
                gap: 4px;
                width: 120px;
            }
            .btn-ctrl {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
        }

        .btn-ctrl:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .action-row {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-action {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-subtle);
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-action.primary {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            border-color: #34d399;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
        }

        .btn-action.primary:hover {
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35);
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <h2>🐍 Snake</h2>
            <p>Eat 50 food to unlock the Diamond Prize!</p>
        </div>

        <div class="difficulty-indicator" id="difficultyLabel">Difficulty: Normal</div>

        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-label">Food Eaten</span>
                <span class="stat-value highlight" id="score">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Best Score</span>
                <span class="stat-value" id="bestScore">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Status</span>
                <span class="stat-value" id="status">Ready</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="360" height="360"></canvas>

        <div class="virtual-controls">
            <div></div>
            <button class="btn-ctrl" onclick="changeDirection('UP')">⬆️</button>
            <div></div>
            <button class="btn-ctrl" onclick="changeDirection('LEFT')">⬅️</button>
            <button class="btn-ctrl" onclick="changeDirection('DOWN')">⬇️</button>
            <button class="btn-ctrl" onclick="changeDirection('RIGHT')">➡️</button>
        </div>

        <div class="action-row">
            <button class="btn-action primary" id="startBtn" onclick="startGame()">Start Game</button>
            <button class="btn-action" id="restartBtn" onclick="restartGame()">Reset</button>
            <a class="btn-action" href="index.html">← Lobby</a>
        </div>
    </div>

    <!-- Payout Modal -->
    <div class="hub-modal-overlay" id="snakeResultModal">
        <div class="hub-modal-box">
            <div class="hub-modal-icon" id="modalResultIcon">🏆🐍</div>
            <h3 class="hub-modal-title" id="modalResultTitle">Game Over!</h3>
            <p class="hub-modal-desc" id="modalResultDesc">Your snake hit a barrier or itself.</p>
            
            <div class="hub-modal-stats">
                <div class="hub-modal-stat">
                    <span class="hub-modal-stat-label">Food Eaten</span>
                    <span class="hub-modal-stat-value highlight" id="modalScore">0</span>
                </div>
                <div class="hub-modal-stat">
                    <span class="hub-modal-stat-label">Coins Earned</span>
                    <span class="hub-modal-stat-value gold" id="modalCoins">0</span>
                </div>
            </div>

            <div class="hub-modal-buttons">
                <button class="hub-btn hub-btn-secondary" onclick="location.href='index.html'">Lobby</button>
                <button class="hub-btn hub-btn-primary" onclick="closeResultModal(); startGame();">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Include Game Hub central script -->
    <script src="game-hub.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Read difficulty configuration
        const difficulty = window.gameHub.getDifficulty();
        document.getElementById('difficultyLabel').textContent = `Difficulty: ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;
        if (difficulty === 'easy') {
            document.getElementById('difficultyLabel').style.color = 'var(--neon-green)';
        } else if (difficulty === 'hard') {
            document.getElementById('difficultyLabel').style.color = 'var(--neon-red)';
        } else {
            document.getElementById('difficultyLabel').style.color = 'var(--neon-gold)';
        }

        const DIFFICULTY_CONFIG = {
            easy: { speed: 110, wrap: true, obstacles: false, coinsPerTen: 5 },
            normal: { speed: 80, wrap: false, obstacles: false, coinsPerTen: 15 },
            hard: { speed: 55, wrap: false, obstacles: true, coinsPerTen: 30 }
        }[difficulty];

        const gridSize = 18; // 18 * 20 = 360px
        const cells = canvas.width / gridSize; // 20x20 grid

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let obstacles = [];
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let bestScore = window.gameHub.stats.bestScores.snake || 0;
        let gameRunning = false;
        let gameOver = false;
        let eatEffectParticles = [];
        let floatingScores = [];

        document.getElementById('bestScore').textContent = bestScore;

        class Particle {
            constructor(x, y, color) {
                this.x = x * gridSize + gridSize/2;
                this.y = y * gridSize + gridSize/2;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.size = Math.random() * 3 + 1;
                this.alpha = 1;
                this.decay = Math.random() * 0.04 + 0.03;
                this.color = color || '#10b981';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        function generateObstacles() {
            obstacles = [];
            if (DIFFICULTY_CONFIG.obstacles) {
                // Spawn 4 concrete barriers in corners (x: 4..15)
                obstacles = [
                    { x: 4, y: 4 }, { x: 4, y: 5 }, { x: 5, y: 4 },
                    { x: 15, y: 4 }, { x: 15, y: 5 }, { x: 14, y: 4 },
                    { x: 4, y: 15 }, { x: 4, y: 14 }, { x: 5, y: 15 },
                    { x: 15, y: 15 }, { x: 15, y: 14 }, { x: 14, y: 15 }
                ];
            }
        }

        function generateFood() {
            let valid = false;
            let tempFood = {};
            while (!valid) {
                tempFood = {
                    x: Math.floor(Math.random() * cells),
                    y: Math.floor(Math.random() * cells)
                };
                // Ensure food is not inside snake or obstacles
                valid = true;
                for (let seg of snake) {
                    if (seg.x === tempFood.x && seg.y === tempFood.y) valid = false;
                }
                for (let obs of obstacles) {
                    if (obs.x === tempFood.x && obs.y === tempFood.y) valid = false;
                }
            }
            food = tempFood;
        }

        function changeDirection(dir) {
            if (['UP', 'DOWN'].includes(dir) && !['UP', 'DOWN'].includes(direction)) nextDirection = dir;
            if (['LEFT', 'RIGHT'].includes(dir) && !['LEFT', 'RIGHT'].includes(direction)) nextDirection = dir;
        }

        function drawGridBackground() {
            ctx.fillStyle = '#07080d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid guidelines
            ctx.strokeStyle = 'rgba(99, 102, 241, 0.04)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= cells; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function draw() {
            drawGridBackground();

            // Draw Obstacles (glowing grey blocks)
            obstacles.forEach(obs => {
                ctx.save();
                ctx.fillStyle = '#475569';
                ctx.strokeStyle = '#ef4444'; // glowing border
                ctx.lineWidth = 1.5;
                ctx.shadowColor = '#ef4444';
                ctx.shadowBlur = 4;
                ctx.fillRect(obs.x * gridSize + 2, obs.y * gridSize + 2, gridSize - 4, gridSize - 4);
                ctx.strokeRect(obs.x * gridSize + 2, obs.y * gridSize + 2, gridSize - 4, gridSize - 4);
                ctx.restore();
            });

            // Draw Snake
            snake.forEach((segment, index) => {
                ctx.save();
                const isHead = index === 0;
                
                // Color gradient (fades to dark green)
                const alpha = Math.max(0.3, 1 - (index / snake.length) * 0.7);
                ctx.fillStyle = isHead ? '#10b981' : `rgba(16, 185, 129, ${alpha})`;
                
                if (isHead) {
                    ctx.shadowColor = '#10b981';
                    ctx.shadowBlur = 10;
                }
                
                // Draw rounded circles
                ctx.beginPath();
                ctx.arc(
                    segment.x * gridSize + gridSize / 2, 
                    segment.y * gridSize + gridSize / 2, 
                    gridSize / 2 - 1, 
                    0, 
                    Math.PI * 2
                );
                ctx.fill();

                // Cybernetic eyes on head
                if (isHead) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#000000';
                    // Draw tiny dots depending on direction
                    const headX = segment.x * gridSize + gridSize/2;
                    const headY = segment.y * gridSize + gridSize/2;
                    if (direction === 'RIGHT' || direction === 'LEFT') {
                        ctx.fillRect(headX + (direction==='RIGHT'?3:-5), headY - 4, 2, 2);
                        ctx.fillRect(headX + (direction==='RIGHT'?3:-5), headY + 2, 2, 2);
                    } else {
                        ctx.fillRect(headX - 4, headY + (direction==='DOWN'?3:-5), 2, 2);
                        ctx.fillRect(headX + 2, headY + (direction==='DOWN'?3:-5), 2, 2);
                    }
                }
                ctx.restore();
            });

            // Draw Food (breathing scale star/cherry)
            ctx.save();
            ctx.shadowColor = '#ef4444';
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#ef4444';
            
            const scale = 1 + Math.sin(Date.now() * 0.01) * 0.15;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2, 
                food.y * gridSize + gridSize / 2, 
                (gridSize / 2.5) * scale, 
                0, 
                Math.PI * 2
            );
            ctx.fill();
            ctx.restore();

            // Draw Particles
            eatEffectParticles.forEach(p => p.draw());

            // Draw floating scores (+1 popup)
            ctx.save();
            ctx.font = 'bold 12px Outfit';
            ctx.textAlign = 'center';
            floatingScores.forEach((fs, idx) => {
                ctx.fillStyle = fs.color || '#10b981';
                ctx.fillText(fs.text || '+10 PTS', fs.x, fs.y);
                fs.y -= 0.8;
                fs.alpha -= 0.03;
                if (fs.alpha <= 0) floatingScores.splice(idx, 1);
            });
            ctx.restore();
        }

        function update() {
            direction = nextDirection;
            const head = { ...snake[0] };

            if (direction === 'UP') head.y--;
            if (direction === 'DOWN') head.y++;
            if (direction === 'LEFT') head.x--;
            if (direction === 'RIGHT') head.x++;

            // Edge checks depending on grid wrap config
            if (DIFFICULTY_CONFIG.wrap) {
                if (head.x < 0) head.x = cells - 1;
                if (head.x >= cells) head.x = 0;
                if (head.y < 0) head.y = cells - 1;
                if (head.y >= cells) head.y = 0;
            } else {
                if (head.x < 0 || head.x >= cells || head.y < 0 || head.y >= cells) {
                    endGame();
                    return;
                }
            }

            // Self collision check
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            // Obstacle collision check
            for (let obs of obstacles) {
                if (head.x === obs.x && head.y === obs.y) {
                    endGame();
                    return;
                }
            }

            // Move snake forward
            snake.unshift(head);

            // Check food eat
            if (head.x === food.x && head.y === food.y) {
                const dodgeChance = { easy: 0.15, normal: 0.45, hard: 0.80 }[difficulty];
                if (Math.random() < dodgeChance) {
                    // Slide up sound tone for dodge
                    window.gameHub.playTone(700, 0.12, 'triangle', 0.15);
                    setTimeout(() => {
                        window.gameHub.playTone(900, 0.12, 'triangle', 0.1);
                    }, 50);

                    // Add float animation for dodge
                    floatingScores.push({
                        x: food.x * gridSize + gridSize/2,
                        y: food.y * gridSize,
                        text: 'DODGED!',
                        color: '#f59e0b',
                        alpha: 1
                    });

                    // Spawn neon gold particles
                    for(let i=0; i<8; i++) {
                        eatEffectParticles.push(new Particle(food.x, food.y, '#f59e0b'));
                    }

                    // Move food to random empty cell
                    generateFood();

                    // Pop tail segment since we didn't eat it!
                    snake.pop();
                } else {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    
                    // Sound beep
                    window.gameHub.playTone(1100, 0.06, 'sine', 0.08);

                    // Add float animation
                    floatingScores.push({ 
                        x: food.x * gridSize + gridSize/2, 
                        y: food.y * gridSize, 
                        text: '+10 PTS',
                        color: '#10b981',
                        alpha: 1 
                    });

                    // Spawn neon bursts
                    for(let i=0; i<10; i++) {
                        eatEffectParticles.push(new Particle(food.x, food.y, '#10b981'));
                    }

                    // Check Diamond prize win target
                    if (score >= 500) { // e.g. 50 food * 10 pts
                        handlePrizeWin();
                        return;
                    }
                    
                    generateFood();
                }
            } else {
                snake.pop();
            }

            // Update particle physics
            eatEffectParticles.forEach(p => p.update());
            eatEffectParticles = eatEffectParticles.filter(p => p.alpha > 0);
        }

        function handlePrizeWin() {
            gameRunning = false;
            
            // Record win in stats
            const coinsEarned = score * (DIFFICULTY_CONFIG.coinsPerTen / 10);
            window.gameHub.recordWin('snake', coinsEarned);
            
            document.getElementById('modalResultTitle').textContent = '🏆 Diamond Champion!';
            document.getElementById('modalResultIcon').textContent = '💎🐍👑';
            document.getElementById('modalResultDesc').textContent = 'Incredible! You reached 50 food points and claimed the legendary Diamond Prize!';
            
            document.getElementById('modalScore').textContent = `${score/10} Food`;
            document.getElementById('modalCoins').textContent = coinsEarned;
            
            setTimeout(() => {
                document.getElementById('snakeResultModal').classList.add('active');
            }, 600);
        }

        function endGame() {
            gameRunning = false;
            gameOver = true;
            
            window.gameHub.playLose();
            document.getElementById('status').textContent = 'Crash!';

            // Calculate coins earned
            const coinsEarned = Math.floor((score / 10) * DIFFICULTY_CONFIG.coinsPerTen);
            
            // Save best score if beaten
            let isNewBest = window.gameHub.recordBestScore('snake', score / 10);
            if (isNewBest) {
                bestScore = score / 10;
                document.getElementById('bestScore').textContent = bestScore;
            }

            // Streak updates
            if (score >= 150) { // eating 15 food is considered a win
                window.gameHub.recordWin('snake', coinsEarned);
                document.getElementById('modalResultTitle').textContent = 'Victory Streak!';
                document.getElementById('modalResultIcon').textContent = '🏆🐍';
                document.getElementById('modalResultDesc').textContent = `Solid run! You successfully secured the win streak requirements on ${difficulty}!`;
            } else {
                window.gameHub.recordLoss();
                window.gameHub.addCoins(coinsEarned); // still payout coins
                document.getElementById('modalResultTitle').textContent = 'Game Over';
                document.getElementById('modalResultIcon').textContent = '🐍💥';
                document.getElementById('modalResultDesc').textContent = `Your snake crashed! Eat 15 food to maintain a win streak. Play on Hard for 3x coin multipliers.`;
            }

            document.getElementById('modalScore').textContent = `${score/10} Food`;
            document.getElementById('modalCoins').textContent = coinsEarned;

            setTimeout(() => {
                document.getElementById('snakeResultModal').classList.add('active');
            }, 800);
        }

        function closeResultModal() {
            document.getElementById('snakeResultModal').classList.remove('active');
        }

        function startGame() {
            if (gameRunning) return;
            window.gameHub.playClick();
            
            gameRunning = true;
            gameOver = false;
            score = 0;
            snake = [{ x: 10, y: 10 }];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            eatEffectParticles = [];
            floatingScores = [];
            
            generateObstacles();
            generateFood();
            
            document.getElementById('score').textContent = '0';
            document.getElementById('status').textContent = 'Playing';
            document.getElementById('startBtn').style.display = 'none';
            
            gameLoop();
        }

        function restartGame() {
            gameRunning = false;
            gameOver = false;
            score = 0;
            snake = [{ x: 10, y: 10 }];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            eatEffectParticles = [];
            floatingScores = [];
            
            document.getElementById('score').textContent = '0';
            document.getElementById('status').textContent = 'Ready';
            document.getElementById('startBtn').style.display = 'inline-flex';
            
            closeResultModal();
            draw();
        }

        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
                setTimeout(gameLoop, DIFFICULTY_CONFIG.speed);
            } else {
                // render explosion particles to fade out
                if (eatEffectParticles.length > 0) {
                    draw();
                    eatEffectParticles.forEach(p => p.update());
                    requestAnimationFrame(gameLoop);
                } else {
                    draw();
                }
            }
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'w', 'W'].includes(e.key)) { e.preventDefault(); changeDirection('UP'); }
            if (['ArrowDown', 's', 'S'].includes(e.key)) { e.preventDefault(); changeDirection('DOWN'); }
            if (['ArrowLeft', 'a', 'A'].includes(e.key)) { e.preventDefault(); changeDirection('LEFT'); }
            if (['ArrowRight', 'd', 'D'].includes(e.key)) { e.preventDefault(); changeDirection('RIGHT'); }
            if (e.key === ' ' && !gameRunning && !gameOver) { startGame(); }
        });

        // Initialize board
        draw();
        document.getElementById('status').textContent = 'Ready';
    </script>
</body>
</html>
